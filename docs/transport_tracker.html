<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tram, Bus & Train Tracker | Melbourne PT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --tram: #00a651; --bus: #ed8b00; --train: #1e88e5;
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #e6edf3; --muted: #8b949e;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 12px 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .search-bar {
            display: flex; gap: 8px; width: 100%; max-width: 600px;
        }
        .search-bar input {
            flex: 1; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px;
        }
        .search-bar input::placeholder { color: var(--muted); }
        .search-bar input:focus { outline: none; border-color: var(--train); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--tram), var(--bus), var(--train)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo h1 { font-size: 18px; }
        .logo p { font-size: 12px; color: var(--muted); }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #238636, #2ea043); color: white; }
        .btn-primary:hover { transform: translateY(-1px); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #484f58; }
        .btn-secondary.active { background: rgba(30,136,229,0.3); color: #58a6ff; border-color: var(--train); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .layout { display: flex; height: calc(100vh - 120px); }
        .map-panel { flex: 1; position: relative; min-width: 0; }
        #map { width: 100%; height: 100%; }
        .sidebar {
            width: 380px; max-width: 100%; background: var(--card); border-left: 1px solid var(--border);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .filter-tabs { display: flex; padding: 12px; gap: 6px; border-bottom: 1px solid var(--border); }
        .filter-tab {
            flex: 1; padding: 10px; border: none; background: var(--bg); color: var(--muted); font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 6px; transition: all 0.2s;
        }
        .filter-tab:hover { color: var(--text); }
        .filter-tab.active { background: var(--border); color: var(--text); }
        .filter-tab[data-type="all"].active { border-left: 3px solid var(--muted); }
        .filter-tab[data-type="0"].active { border-left: 3px solid var(--train); }
        .filter-tab[data-type="1"].active { border-left: 3px solid var(--tram); }
        .filter-tab[data-type="2"].active { border-left: 3px solid var(--bus); }
        .stops-list { flex: 1; overflow-y: auto; padding: 12px; }
        .stop-card, .route-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px;
            padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
        }
        .stop-card:hover, .route-card:hover { border-color: var(--muted); background: rgba(255,255,255,0.06); }
        .stop-card.selected, .route-card.selected { border-color: var(--train); box-shadow: 0 0 0 2px rgba(30,136,229,0.3); }
        .stop-type, .route-type { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        .stop-type.train, .route-type.train { color: var(--train); }
        .stop-type.tram, .route-type.tram { color: var(--tram); }
        .stop-type.bus, .route-type.bus { color: var(--bus); }
        .stop-name, .route-name { font-size: 15px; font-weight: 600; }
        .stop-distance, .route-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .search-section { padding: 12px; border-bottom: 1px solid var(--border); }
        .search-section h3 { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
        .departures-panel {
            border-top: 1px solid var(--border); padding: 16px; max-height: 320px; overflow-y: auto;
        }
        .departures-panel h3 { font-size: 14px; margin-bottom: 12px; color: var(--muted); }
        .departure-row {
            display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
            border-bottom: 1px solid var(--border); font-size: 14px;
        }
        .departure-row:last-child { border-bottom: none; }
        .departure-route { font-weight: 700; min-width: 50px; }
        .departure-dest { color: var(--muted); flex: 1; margin: 0 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .departure-time { font-weight: 600; }
        .departure-time.realtime { color: #2ea043; }
        .loading { text-align: center; padding: 24px; color: var(--muted); }
        .loading i { font-size: 32px; margin-bottom: 12px; opacity: 0.6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .location-btn { position: absolute; top: 12px; right: 12px; z-index: 1000; }
        .leaflet-popup-content { margin: 12px 16px; font-size: 14px; }
        .leaflet-popup-content strong { display: block; margin-bottom: 4px; }
        @media (max-width: 900px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; max-height: 45vh; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-row">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-route"></i></div>
                <div>
                    <h1>Melbourne Transport Tracker</h1>
                    <p>Search routes & stops • Timetable & live data</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="locateBtn" onclick="locateUser()">
                    <i class="fas fa-location-crosshairs"></i> My location
                </button>
                <button class="btn btn-secondary" id="liveVehiclesBtn" onclick="toggleLiveVehicles()" title="Show real-time train, tram, bus positions">
                    <i class="fas fa-map-marker-alt"></i> Live vehicles
                </button>
                <a href="https://www.tramtracker.com.au/" target="_blank" rel="noopener" class="btn btn-secondary"><i class="fas fa-external-link-alt"></i> tramTRACKER</a>
                <a href="https://www.venturabus.com.au/live-tracking" target="_blank" rel="noopener" class="btn btn-secondary"><i class="fas fa-bus"></i> Ventura</a>
                <a href="https://www.metrotrains.com.au/metronotify/" target="_blank" rel="noopener" class="btn btn-secondary"><i class="fas fa-bell"></i> metroNotify</a>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search route (e.g. 109, Belgrave) or stop (e.g. Flinders Street, Richmond)..." 
                   onkeydown="if(event.key==='Enter')doSearch()" />
            <button class="btn btn-primary" onclick="doSearch()"><i class="fas fa-search"></i> Search</button>
        </div>
    </header>

    <div class="layout">
        <div class="map-panel">
            <div id="map"></div>
            <button class="btn btn-primary location-btn" id="mapLocateBtn" onclick="locateUser()" title="Center on my location">
                <i class="fas fa-location-crosshairs"></i>
            </button>
        </div>
        <div class="sidebar">
            <div class="filter-tabs">
                <button class="filter-tab active" data-type="all" onclick="setFilter('all')">All</button>
                <button class="filter-tab" data-type="0" onclick="setFilter(0)"><i class="fas fa-train"></i> Train</button>
                <button class="filter-tab" data-type="1" onclick="setFilter(1)"><i class="fas fa-tram"></i> Tram</button>
                <button class="filter-tab" data-type="2" onclick="setFilter(2)"><i class="fas fa-bus"></i> Bus</button>
            </div>
            <div class="stops-list" id="stopsList">
                <div class="empty-state" id="stopsEmpty">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>Click "Use my location" or pan the map to load nearby stops.</p>
                    <p style="margin-top:8px;font-size:12px;">Requires PTV API key for live data.</p>
                </div>
            </div>
            <div class="departures-panel" id="departuresPanel" style="display:none;">
                <h3 id="departuresTitle">Departures</h3>
                <div id="departuresList"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ========== API credentials - Put your keys here ==========
        const PTV_DEVID = 'YOUR_DEVID';  // PTV Timetable API
        const PTV_KEY = 'YOUR_API_KEY';
        const TRANSPORT_VIC_KEY = 'YOUR_TRANSPORT_VIC_KEY';  // Transport Victoria Open Data (vehicle positions)
        // Get key: https://opendata.transport.vic.gov.au/
        // ===================================================

        const MELBOURNE = [-37.8136, 144.9631];
        const ROUTE_TYPES = { 0: 'train', 1: 'tram', 2: 'bus' };
        const ROUTE_COLORS = { 0: '#1e88e5', 1: '#00a651', 2: '#ed8b00' };

        let map, userMarker, stopMarkers = [], vehicleMarkers = [];
        let liveVehiclesOn = false;
        let vehicleRefreshInterval = null;
        let userLat, userLng;
        let currentFilter = 'all';
        let selectedStop = null;
        let allStops = [];
        let searchResults = { stops: [], routes: [] };
        let viewMode = 'nearby';  // 'nearby' | 'search'
        let apiBase = '';

        if (window.location.port === '3000' || window.location.hostname === 'localhost') {
            apiBase = '';
        } else {
            apiBase = window.location.origin;
        }

        function getPt() {
            return { devid: PTV_DEVID, key: PTV_KEY };
        }

        function ptvUrl(path, params = {}) {
            const { devid, key } = getPt();
            if (!devid || !key || devid === 'YOUR_DEVID' || key === 'YOUR_API_KEY') return null;
            const q = new URLSearchParams();
            for (const [k, v] of Object.entries(params)) {
                if (Array.isArray(v)) v.forEach(x => q.append(k, x));
                else if (v != null) q.set(k, v);
            }
            q.set('devid', devid);
            q.set('key', key);
            return `${apiBase}/api/ptv${path}?${q.toString()}`;
        }

        function gtfsUrl(mode) {
            if (!TRANSPORT_VIC_KEY || TRANSPORT_VIC_KEY === 'YOUR_TRANSPORT_VIC_KEY') return null;
            return `${apiBase}/api/gtfs/vehicle-positions/${mode}?key=${encodeURIComponent(TRANSPORT_VIC_KEY)}`;
        }

        function toggleLiveVehicles() {
            liveVehiclesOn = !liveVehiclesOn;
            document.getElementById('liveVehiclesBtn').classList.toggle('active', liveVehiclesOn);
            if (liveVehiclesOn) {
                fetchAllVehiclePositions();
                vehicleRefreshInterval = setInterval(fetchAllVehiclePositions, 30000);  // 30s (rate limit 24/min)
            } else {
                clearInterval(vehicleRefreshInterval);
                vehicleRefreshInterval = null;
                clearVehicleMarkers();
            }
        }

        function clearVehicleMarkers() {
            vehicleMarkers.forEach(m => { if (map && m) map.removeLayer(m); });
            vehicleMarkers = [];
        }

        async function fetchAllVehiclePositions() {
            if (!gtfsUrl('metro')) {
                console.warn('Add TRANSPORT_VIC_KEY for live vehicles');
                return;
            }
            const modes = ['metro', 'tram', 'bus'];
            const colors = { metro: '#1e88e5', tram: '#00a651', bus: '#ed8b00' };
            clearVehicleMarkers();
            for (const mode of modes) {
                const url = gtfsUrl(mode);
                if (!url) continue;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.error) continue;
                    (data.vehicles || []).forEach(v => {
                        if (v.lat != null && v.lng != null) {
                            const color = colors[mode] || '#666';
                            const icon = L.divIcon({
                                className: 'vehicle-marker',
                                html: `<div style="width:12px;height:12px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
                                iconSize: [12, 12], iconAnchor: [6, 6]
                            });
                            const m = L.marker([v.lat, v.lng], { icon })
                                .bindPopup(`<strong>${mode}</strong><br>${v.trip?.route_id || ''} ${v.vehicle?.id || ''}`.trim());
                            m.addTo(map);
                            vehicleMarkers.push(m);
                        }
                    });
                } catch (e) { console.warn('Vehicle fetch failed:', mode, e); }
            }
        }

        function doSearch() {
            const term = document.getElementById('searchInput').value.trim();
            if (!term) return;
            const url = ptvUrl(`/v3/search/${encodeURIComponent(term)}`, { route_types: [0, 1, 2], include_outlets: false });
            const listEl = document.getElementById('stopsList');
            const emptyEl = document.getElementById('stopsEmpty');
            if (!url) {
                listEl.innerHTML = '<div class="empty-state"><p>Add PTV API key in code (PTV_DEVID, PTV_KEY).</p></div>';
                emptyEl.style.display = 'none';
                return;
            }
            emptyEl.style.display = 'none';
            listEl.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Searching...</p></div>';
            fetch(url).then(r => r.json()).then(data => {
                if (data.error) {
                    listEl.innerHTML = `<div class="empty-state"><p>${data.error}</p></div>`;
                    return;
                }
                const stops = [];
                const stopsData = data.stops || {};
                const stopsArr = Array.isArray(stopsData) ? stopsData : Object.values(stopsData);
                stopsArr.forEach(s => {
                    if (s && s.stop_id) stops.push({
                        stop_id: s.stop_id,
                        route_type: s.route_type,
                        name: s.stop_name,
                        lat: s.stop_latitude,
                        lng: s.stop_longitude,
                        suburb: s.stop_suburb,
                        route_name: s.route_name
                    });
                });
                const routes = [];
                const routesData = data.routes || {};
                const routesArr = Array.isArray(routesData) ? routesData : Object.values(routesData);
                routesArr.forEach(r => {
                    if (r && r.route_id) routes.push({
                        route_id: r.route_id,
                        route_type: r.route_type,
                        route_name: r.route_name,
                        route_number: r.route_number,
                        route_gtfs_id: r.route_gtfs_id
                    });
                });
                searchResults = { stops, routes };
                allStops = stops;
                selectedStop = null;
                viewMode = 'search';
                renderSearchResults();
                renderStopMarkers();
                if (stops.length > 0) {
                    const bounds = L.latLngBounds(stops.map(s => [s.lat, s.lng]));
                    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
                }
            }).catch(e => {
                listEl.innerHTML = `<div class="empty-state"><p>Search failed: ${e.message}</p></div>`;
            });
        }

        function renderSearchResults() {
            const listEl = document.getElementById('stopsList');
            const emptyEl = document.getElementById('stopsEmpty');
            const { stops, routes } = searchResults;
            let html = '';
            if (routes.length > 0) {
                html += '<div class="search-section"><h3>Routes</h3>';
                routes.forEach(r => {
                    const filtered = currentFilter === 'all' || r.route_type === parseInt(currentFilter);
                    if (!filtered) return;
                    html += `<div class="route-card" onclick="selectRoute(${r.route_id}, ${r.route_type})">
                        <div class="route-type ${ROUTE_TYPES[r.route_type]}">${ROUTE_TYPES[r.route_type]}</div>
                        <div class="route-name">${r.route_number || r.route_name || r.route_id} - ${r.route_name || ''}</div>
                        <div class="route-desc">Click to view stops & departures</div>
                    </div>`;
                });
                html += '</div>';
            }
            if (stops.length > 0) {
                html += '<div class="search-section"><h3>Stops</h3>';
                const filtered = currentFilter === 'all' ? stops : stops.filter(s => s.route_type === parseInt(currentFilter));
                filtered.forEach(s => {
                    html += `<div class="stop-card ${selectedStop && selectedStop.stop_id === s.stop_id ? 'selected' : ''}" 
                         onclick="selectStop(${s.stop_id}, ${s.route_type})">
                        <div class="stop-type ${ROUTE_TYPES[s.route_type]}">${ROUTE_TYPES[s.route_type]}</div>
                        <div class="stop-name">${s.name}</div>
                        <div class="stop-distance">${s.suburb || ''} ${s.route_name ? '• ' + s.route_name : ''}</div>
                    </div>`;
                });
                html += '</div>';
            }
            if (!html) {
                emptyEl.style.display = 'block';
                emptyEl.innerHTML = '<i class="fas fa-search"></i><p>No results found.</p><p>Try a route number (109, 86) or stop name (Flinders Street).</p>';
                listEl.innerHTML = '';
            } else {
                emptyEl.style.display = 'none';
                listEl.innerHTML = html;
            }
        }

        function selectRoute(routeId, routeType) {
            const url = ptvUrl(`/v3/stops/route/${routeId}/route_type/${routeType}`);
            const listEl = document.getElementById('stopsList');
            if (!url) return;
            listEl.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Loading stops on route...</p></div>';
            fetch(url).then(r => r.json()).then(data => {
                if (data.error) {
                    listEl.innerHTML = `<div class="empty-state"><p>${data.error}</p></div>`;
                    return;
                }
                const stops = [];
                const stopsData = data.stops || {};
                const stopsArr = Array.isArray(stopsData) ? stopsData : Object.values(stopsData);
                stopsArr.forEach(s => {
                    if (s && s.stop_id) stops.push({
                        stop_id: s.stop_id,
                        route_type: s.route_type,
                        name: s.stop_name,
                        lat: s.stop_latitude,
                        lng: s.stop_longitude,
                        suburb: s.stop_suburb
                    });
                });
                allStops = stops;
                searchResults = { stops: stops, routes: [] };
                selectedStop = null;
                viewMode = 'search';
                renderSearchResults();
                renderStopMarkers();
                if (stops.length > 0) {
                    const bounds = L.latLngBounds(stops.map(s => [s.lat, s.lng]));
                    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
                }
            }).catch(e => {
                listEl.innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
            });
        }

        function initMap() {
            map = L.map('map').setView(MELBOURNE, 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
            map.on('moveend', () => {
                const c = map.getCenter();
                if (userLat && userLng && Math.abs(c.lat - userLat) < 0.002 && Math.abs(c.lng - userLng) < 0.002) return;
                fetchNearbyStops(c.lat, c.lng);
            });
        }

        function locateUser() {
            if (!navigator.geolocation) {
                alert('Geolocation not supported.');
                return;
            }
            document.getElementById('locateBtn').disabled = true;
            document.getElementById('mapLocateBtn').disabled = true;
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    if (!userMarker) {
                        userMarker = L.marker([userLat, userLng], {
                            icon: L.divIcon({
                                className: 'user-marker',
                                html: '<div style="width:24px;height:24px;background:#1e88e5;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>',
                                iconSize: [24, 24], iconAnchor: [12, 12]
                            })
                        }).addTo(map);
                    } else {
                        userMarker.setLatLng([userLat, userLng]);
                    }
                    map.setView([userLat, userLng], 15);
                    fetchNearbyStops(userLat, userLng);
                    document.getElementById('locateBtn').disabled = false;
                    document.getElementById('mapLocateBtn').disabled = false;
                },
                err => {
                    alert('Location error: ' + err.message);
                    document.getElementById('locateBtn').disabled = false;
                    document.getElementById('mapLocateBtn').disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function fetchNearbyStops(lat, lng) {
            const url = ptvUrl(`/v3/stops/location/${lat},${lng}`, { max_results: 50, max_distance: 1500, route_types: [0,1,2] });
            const listEl = document.getElementById('stopsList');
            const emptyEl = document.getElementById('stopsEmpty');

            if (!url) {
                useStaticStops(lat, lng);
                return;
            }

            emptyEl.style.display = 'none';
            listEl.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Loading nearby stops...</p></div>';

            fetch(url).then(r => r.json()).then(data => {
                if (data.error) {
                    listEl.innerHTML = `<div class="empty-state"><p>${data.error}</p><p>Check API config or use static data.</p></div>`;
                    useStaticStops(lat, lng);
                    return;
                }
                const stops = data.stops || [];
                allStops = Object.entries(stops).map(([id, s]) => ({
                    stop_id: s.stop_id,
                    route_type: s.route_type,
                    name: s.stop_name,
                    lat: s.stop_latitude,
                    lng: s.stop_longitude,
                    distance: s.stop_distance,
                    suburb: s.stop_suburb
                })).sort((a, b) => (a.distance || 0) - (b.distance || 0));
                searchResults = { stops: [], routes: [] };
                viewMode = 'nearby';
                renderStops();
                renderStopMarkers();
            }).catch(e => {
                listEl.innerHTML = `<div class="empty-state"><p>Fetch failed: ${e.message}</p></div>`;
                useStaticStops(lat, lng);
            });
        }

        const STATIC_STOPS = [
            { stop_id: 1071, route_type: 0, name: 'Flinders Street', lat: -37.8182, lng: 144.9668, suburb: 'Melbourne' },
            { stop_id: 1048, route_type: 0, name: 'Melbourne Central', lat: -37.8104, lng: 144.9626, suburb: 'Melbourne' },
            { stop_id: 1104, route_type: 0, name: 'Southern Cross', lat: -37.8184, lng: 144.9524, suburb: 'Melbourne' },
            { stop_id: 1151, route_type: 0, name: 'Parliament', lat: -37.8114, lng: 144.9732, suburb: 'Melbourne' },
            { stop_id: 2624, route_type: 1, name: 'Flinders Street/Swanston St', lat: -37.8185, lng: 144.9670, suburb: 'Melbourne' },
            { stop_id: 2625, route_type: 1, name: 'Bourke Street Mall/Swanston St', lat: -37.8132, lng: 144.9656, suburb: 'Melbourne' },
            { stop_id: 2626, route_type: 1, name: 'Collins St/Swanston St', lat: -37.8164, lng: 144.9670, suburb: 'Melbourne' },
            { stop_id: 2001, route_type: 2, name: 'Flinders Street Station', lat: -37.8183, lng: 144.9665, suburb: 'Melbourne' },
            { stop_id: 2002, route_type: 2, name: 'Melbourne Central', lat: -37.8105, lng: 144.9628, suburb: 'Melbourne' },
        ];

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function useStaticStops(lat, lng) {
            allStops = STATIC_STOPS.map(s => ({
                ...s,
                distance: haversine(lat, lng, s.lat, s.lng)
            })).sort((a, b) => a.distance - b.distance);
            searchResults = { stops: [], routes: [] };
            viewMode = 'nearby';
            renderStops();
            renderStopMarkers();
        }

        function renderStops() {
            const listEl = document.getElementById('stopsList');
            const emptyEl = document.getElementById('stopsEmpty');
            const filtered = currentFilter === 'all'
                ? allStops
                : allStops.filter(s => s.route_type === parseInt(currentFilter));
            if (filtered.length === 0) {
                emptyEl.style.display = 'block';
                emptyEl.innerHTML = '<i class="fas fa-map-marker-alt"></i><p>No stops in this area.</p>';
                listEl.innerHTML = '';
                return;
            }
            emptyEl.style.display = 'none';
            listEl.innerHTML = filtered.map(s => `
                <div class="stop-card ${selectedStop && selectedStop.stop_id === s.stop_id ? 'selected' : ''}" 
                     data-stop-id="${s.stop_id}" data-route-type="${s.route_type}" onclick="selectStop(${s.stop_id}, ${s.route_type})">
                    <div class="stop-type ${ROUTE_TYPES[s.route_type]}">${ROUTE_TYPES[s.route_type]}</div>
                    <div class="stop-name">${s.name}</div>
                    <div class="stop-distance">${s.distance ? Math.round(s.distance) + ' m away' : (s.suburb || '')}</div>
                </div>
            `).join('');
        }

        function renderStopMarkers() {
            stopMarkers.forEach(m => map.removeLayer(m));
            stopMarkers = [];
            allStops.forEach(s => {
                const color = ROUTE_COLORS[s.route_type] || '#666';
                const icon = L.divIcon({
                    className: 'stop-marker',
                    html: `<div style="width:16px;height:16px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>`,
                    iconSize: [16, 16], iconAnchor: [8, 8]
                });
                const m = L.marker([s.lat, s.lng], { icon })
                    .bindPopup(`<strong>${s.name}</strong><br>${ROUTE_TYPES[s.route_type]} • ${s.distance ? Math.round(s.distance) + ' m' : ''}`)
                    .on('click', () => selectStop(s.stop_id, s.route_type));
                m.addTo(map);
                stopMarkers.push(m);
            });
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.filter-tab[data-type="${type}"]`).classList.add('active');
            if (viewMode === 'search') renderSearchResults();
            else renderStops();
        }

        function selectStop(stopId, routeType) {
            selectedStop = { stop_id: stopId, route_type: routeType };
            renderStops();
            fetchDepartures(stopId, routeType);
        }

        function fetchDepartures(stopId, routeType) {
            const url = ptvUrl(`/v3/departures/route_type/${routeType}/stop/${stopId}`, { max_results: 10 });
            const panel = document.getElementById('departuresPanel');
            const list = document.getElementById('departuresList');
            const title = document.getElementById('departuresTitle');

            const stop = allStops.find(s => s.stop_id === stopId && s.route_type === routeType);
            title.textContent = stop ? `Departures: ${stop.name}` : 'Departures';

            if (!url) {
                list.innerHTML = '<p class="empty-state">Add PTV API key for live departures.</p>';
                panel.style.display = 'block';
                return;
            }

            list.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Loading...</p></div>';
            panel.style.display = 'block';

            fetch(url).then(r => r.json()).then(data => {
                if (data.error) {
                    list.innerHTML = `<p class="empty-state">${data.error}</p>`;
                    return;
                }
                const deps = (data.departures || []).slice(0, 10);
                const runs = data.runs || {};
                const routes = data.routes || {};
                if (deps.length === 0) {
                    list.innerHTML = '<p class="empty-state">No departures in the next 90 minutes.</p>';
                    return;
                }
                list.innerHTML = deps.map(d => {
                    const run = runs[d.run_ref];
                    const route = routes[String(d.route_id)];
                    const dest = run ? run.destination_name : '';
                    const routeNum = route ? (route.route_number || route.route_name || '') : '';
                    const timeUtc = d.estimated_departure_utc || d.scheduled_departure_utc;
                    const isRealtime = !!d.estimated_departure_utc;
                    const timeStr = timeUtc ? new Date(timeUtc).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }) : '--';
                    return `
                        <div class="departure-row">
                            <span class="departure-route">${routeNum || d.route_id}</span>
                            <span class="departure-dest" title="${dest}">${dest || '—'}</span>
                            <span class="departure-time ${isRealtime ? 'realtime' : ''}">${timeStr}</span>
                        </div>
                    `;
                }).join('');
            }).catch(e => {
                list.innerHTML = `<p class="empty-state">Error: ${e.message}</p>`;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            fetchNearbyStops(MELBOURNE[0], MELBOURNE[1]);
        });
    </script>
</body>
</html>
